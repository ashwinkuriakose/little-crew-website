<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 110" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&amp;family=Pacifico&amp;display=swap');
      .brand-title {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        fill: #ffffff;
        font-size: 58px;
        letter-spacing: -2px;
      }
      .exclamation {
        fill: #ffffff;
      }
      .brand-crew {
        font-family: 'Pacifico', cursive;
        fill: #ffffff;
        font-size: 42px;
      }
      .gradient-bg {
        fill: url(#crew-grad);
      }
    </style>
    <linearGradient id="crew-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
  </defs>
  
  <!-- litt!e text -->
  <text x="10" y="75" class="brand-title">litt<tspan class="exclamation">!</tspan>e</text>
  
  <!-- Crew container -->
  <rect x="155" y="22" width="155" height="68" rx="18" class="gradient-bg" />
  
  <!-- Crew text -->
  <text x="232" y="69" class="brand-crew" text-anchor="middle">Crew</text>
</svg>
